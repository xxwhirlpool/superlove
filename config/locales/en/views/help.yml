en:
  help:
    first_login:
      additional_info:
        header: Additional Browsing Information
        history_mark_later:
          header: History and Mark for Later
          history: History
          history_faq: History and Mark for Later FAQ
          html: You can access and manage your history by going to %{your_dashboard_link} and selecting the "%{history_link}" link in the side menu in the default browser skin or on top of the page in mobile devices. You can clear your history, or delete individual entries if you don't want these entries to show up in your history. You can also add works to the "Marked for Later" list in your history. For more information on History, please visit the %{history_faq_link}.
          your_dashboard: your Dashboard
        subscriptions:
          header: Subscriptions
          html: You can subscribe to a work, collection, series of works, or user by selecting the "Subscribe" link at the top or bottom of a work, or at the top or bottom of a collection or series page, or the user's profile page. You can check your subscriptions from %{your_dashboard_link} by selecting the "Subscriptions" link. For more information on Subscriptions, please visit the %{subscriptions_feed_faq_link}.
          subscriptions_feed_faq: Subscriptions and Feeds FAQ
          your_dashboard: your Dashboard
      bookmarking_works:
        bookmarks_faq: Bookmarks FAQ
        header: Bookmarking Works
        html: You can bookmark works on the Archive as well as works hosted on other sites. You can choose to make your bookmarks public or private. You can also mark a public bookmark as a rec (recommendation). Additionally, you can add notes and tags to the bookmark, and/or add it to a collection. For more instructions on managing your Bookmarks, please visit the %{bookmarks_faq_link}.
      browsing:
        all_fandoms: All Fandoms
        fandoms: Fandoms
        header: Browsing
        html: You can start browsing works by going to the "%{fandoms_link}" tab at the top of any Archive page in the default skin and selecting either "%{all_fandoms_link}" or one of the subsets such as "%{movies_link}". Alternatively, you can use the %{search_feature_link} to look for specific fandoms, works, or users. You can use the "Sort and Filter" form to narrow down the results in any fandom page. For more instructions, please visit %{search_browse_faq_link} and the %{search_browse_tutorial_link}.
        movies: Movies
        search_browse_faq: Search and Browse FAQ
        search_browse_tutorial: Searching and browsing tutorial
        search_feature: search feature
      editing_profile:
        edit_my_profile: Edit My Profile
        header: Editing Your Profile, Password, and Preferences
        html: To add your info, go to %{your_dashboard_link}, select the "%{profile_link}" tab, and select "%{edit_my_profile_link}" from the range of options at the end of the page. Here, you can enter some basic personal information. It's also where to go to change your password. Refer to the %{profile_faq_link} for more information.
        profile: Profile
        profile_faq: Profile FAQ
        your_dashboard: your Dashboard
      logging_in_out:
        forgot_password: forgot your password
        header: Logging In and Logging Out
        html: To log in, locate the login link and fill in your Username and  Password. The link will be located at the top right of the screen and as indicated by your screenreader if you're using one. If you forget your password, then select "%{forgot_password_link}". To log out, select "Log Out" on the top right corner in the default browser skin.
      posting_works:
        header: Posting Works
        html: To open the Post New Work page, just select the %{post_new_link} link from the menu of the Post tab located at the top right of the page in the default browser skin. Visit the %{posting_editing_faq_link} or check out our %{tutorial_link} for more information.
        post_new: Post New
        posting_editing_faq: Posting and Editing FAQ
        tutorial: 'Tutorial: Posting a Work on AO3'
      preferences:
        edit_my_profile: Edit My Profile
        header: Preferences
        html: '"%{set_my_preferences_link}" is located next to the "%{edit_my_profile_link}" button, and allows you to adjust certain settings to personalize your experience on the site. The Preferences area controls both the Archive''s behavior (such as whether your history is saved) and the Archive''s appearance. Go to the %{preferences_faq_link} for more details.'
        preferences_faq: Preferences FAQ
        set_my_preferences: Set My Preferences
        skins_detail_html: For more information on how to customize the skins and interface of the Archive, refer to the %{skins_faq_link} and %{tutorials_list_link}.
        skins_faq: Skins and Archive Interface FAQ
        tutorials_list: List of Tutorials
      pseuds:
        header: Pseuds
        html: Pseuds are like pen names linked to your account. You can use different pseuds to post your works under the appropriate name while still managing them through the same account. You can %{manage_your_pseuds_link} through your profile page. For more information, please visit the %{pseuds_faq_link}.
        manage_your_pseuds: manage your pseuds
        pseuds_faq: Pseuds FAQ
      support_and_feedback:
        archive_faq: Archive FAQ
        contact_support: contact Support
        header: Support and Feedback
        html: Some frequently asked questions about the Archive are answered in the broader %{archive_faq_link}. You may also like to check out our %{known_issues_link}. If you need more help, please %{contact_support_link}. If you want to know more about some user-created tools that work with the Archive, please visit the %{unofficial_tools_faq_link}.
        known_issues: Known Issues
        unofficial_tools_faq: Unofficial Browser Tools FAQ
      table_of_contents: Table of Contents
      tags:
        header: Tags
        html: All tags on the Archive—including those for fandoms, relationships, and characters—start out user-created. You can always use the existing tags by selecting from the autocomplete list. If you cannot find the tags you want to use, feel free to create new tags for your works. Behind the scenes, our tag wrangling team will match the tags up with their synonyms, so that people can find your work whether you tag it "<abbr>AMTDI</abbr>", "Aliens Made Them Do It", or "Sex Pollen". Refer to the %{tags_faq_link} to learn more.
        tags_faq: Tags FAQ
      tips_to_start: Here are some tips to help you get started.
      tos:
        additional_questions_html: If you have additional questions that are not covered here, please %{contact_abuse_link}.
        contact_abuse: contact our Policy & Abuse team
        content_policy: Content Policy
        header: Terms of Service
        info_html: You can learn about our policies and procedures by reviewing the %{tos_link}, including the %{content_policy_link} and %{privacy_policy_link}. Answers to common questions are available in the %{tos_faq_link}.
        privacy_policy: Privacy Policy
        tos: Terms of Service
        tos_faq: Terms of Service FAQ
      warnings:
        archive_specific_warnings: Archive-specific warnings
        description_html: 'The Archive defines four "primary" %{archive_specific_warnings_link}: "Graphic Depictions Of Violence", "Major Character Death", "Rape/Non-Con", and "Underage Sex". When posting a work, you have the option to explicitly select warnings for this content, deny the presence of such content ("No Archive Warnings Apply"), or choose not to apply warnings regardless of whether or not these warnings are applicable ("Creator Chose Not To Use Archive Warnings"). Remember, "No Archive Warnings Apply" only refers to the listed primary warnings.'
        header: Warnings
        symbols_html: When browsing the Archive, warnings will be displayed in the blurb of each work. Official warning tags are displayed in bold. A four square grid in the top left corner of each work's blurb indicates the work's rating, completion status, pairing category, and any Archive warnings that apply to it. Refer to the %{symbols_key_chart_link} for more information.
        symbols_key_chart: Symbols Key Chart
      welcome_header: Welcome to the %{app_name}!
    preferences_locale:
      locale:
        description: This preference allows you to select your preferred language for email messages that the Archive sends to you. The templates for these messages are currently being updated and translated by our volunteers. This is a work in progress; not all messages will be available in languages other than English at this time. If the template for that email has not yet been translated to your language, it will be sent in English.
        header: Set preferred locale
      page_heading: Locale Preferences
    skins_basics:
      only: only
      site_skins_basics: A site skin lets you customize your browsing experience when you are logged in to your account. Don't like the Archive fonts? You can change them! Don't like the red header? Swap it out for blue! When you make a site skin, keep in mind that you are only changing the Archive for yourself -- other Archive users will see the Archive in whatever skin they are using. In other words, site skins are useful for creating your own ideal browsing experience, not for changing the way a work appears for others.
      work_skins_basics_html: A work skin lets you change the way one or more of your works appears to others. Work skins will %{only_bold} affect the body of the work -- that is, you can't change what the Archive navigation or background look like for someone else. What you can do, however, is create your own classes. For instance, you can change the color of some of your text, or indent some paragraphs in a particular way, and so on.
    skins_creating:
      allowed_keywords:
        description_html: We allow all standard CSS keyword values (e.g., %{absolute_code}, %{bottom_code}, %{center_code}, %{underline_code}, etc.).
        header: Keywords
      allowed_properties: We allow the following properties including all their variations (and shorthand values)
      allowed_specific_properties: We also allow the following specific properties
      colors:
        common_color_names: the set of commonly-supported color names
        description_html: You can specify colors using hex values (eg, %{black_hex_code} is black in hex) or with RGB or RGBA values (e.g., %{black_rgb_code} and %{black_rgba_code} both give you black). This may be safer since not all browsers will necessarily support all color names. However, color names are more readable and easier to remember, so we also allow color names. (We suggest you stick to %{common_color_names_link}.)
        header: Colors
      comments:
        description: Comments are stripped from CSS.
        header: Comments
      css_basics:
        description:
          background_color_example_html: 'Inside any tags with the id "header", set the background color to purple: %{background_color_css_code}'
          blink_example_html: 'Inside any tags with the class "meta", make the text blink: (we do not advise this) %{blink_css_code}'
          css_getting_started_tutorial: Getting Started (CSS Tutorial) from MDN
          css_intro_tutorial: CSS introduction tutorial
          css_selectors_and_rules_html: The %{selector_bold} is either the name of an HTML tag (like %{body_tag_code} or %{h1_tag_code}), or it can be an id or class that has been set on a tag. The %{property_bold} is what you want to change in the contents of that tag (for instance the font size), and the %{value_bold} is what you want to set it to.
          css_tutorials: 'Some useful CSS tutorials for more information:'
          example_css: 'selector {property: value;}'
          examples_header: 'Examples:'
          font_size_example_html: 'Inside the "body" tag, set the font size slightly larger than the baseline: %{font_size_css_code}'
          line_of_css_html: 'A line of CSS code looks pretty much like this: %{example_css_code}'
          property: property
          selector: selector
          value: value
        header: 'If you are new to CSS, here are the basics:'
      custom_properties:
        description:
          accepting_properties_html: All properties except %{font_family_code} and %{content_code} accept the %{var_code} function as a value. We don't allow fallbacks.
          availability_html: Custom properties and the %{var_code} function are only available for site skins, and won't work on work skins.
          names: Custom property names can contain any combination of lowercase letters (a-z) in the English alphabet, numerals zero to nine (0-9), dashes (-), and underscores (_). They can't contain single (') or double (") quotation marks, or URLs. Any uppercase letters (A-Z) will be converted to lowercase.
        header: Custom Properties (Variables)
      external_urls:
        description_html: We allow external image URLs (specified as %{example_url_code}) in JPG, GIF, and PNG formats. Please note, however, that skins using external images will not be approved for public use.
        header: URLs
      font_family:
        description:
          cannot: cannot
          font_names_html: In the %{font_family_code} property, we allow you to specify any font with an alphanumeric name. You can (but don't have to) specify the name with single or double quotes around it, just make sure the quotes match. (e.g., 'Gill Sans' and "Gill Sans" are both fine; 'Gill Sans" won't work.) Keep in mind that a font has to be installed on the user's operating system to work. It's a good idea when specifying fonts to use fallbacks in case your first-choice font isn't available. See %{web_safe_fonts_link}.
          no_font_face_html: We %{cannot_bold} allow the %{font_face_code} attribute. Sorry! If you have an uncommon font that you want to use in a skin you would like to share, we suggest adding a comment in the skin's "Description" field with a pointer to a place for users to download the font themselves, and using web-safe fonts as fallbacks.
          separate_properties_html: Unfortunately, you cannot use the %{font_code} shorthand in your CSS. All font properties have to be specified separately, e.g., %{font_properties_css_code}
          web_safe_fonts: a set of web-safe fonts with fallbacks
        header: Font and Font Family
      intro:
        description: 'Note that for security reasons, you can only use a limited set of CSS code: all other declarations and comments will be removed!'
        header: You can create new skins for the Archive using our wizard, or by writing your own CSS (cascading style sheets) code
      numeric_values:
        description:
          em_unit_html: 'PS: we highly encourage learning about and using %{em_code}, which lets you set things relative to the viewer''s current font size! It will make your layouts much more flexible and responsive to different browser/font settings.'
          precision_html: 'You can specify numeric values up to two decimal places, either as percentages or in %{various_units_link}: %{units_list_code}'
          units_list: cm, em, ex, in, mm, pc, pt, px
          various_units: various units
        header: Numeric Values
      one_declaration_per_ruleset:
        description_html: 'The CSS parser we use retains only one declaration for each property, meaning that rulesets like %{repeated_declarations_css_code} will have all but the last %{background_code} declaration removed (so your gradient would only show up in WebKit browsers). To avoid losing declarations with repeated properties, split each one into its own ruleset, like so:'
        header: Use only one declaration per property per ruleset
      scale:
        description_html: You can specify scale (for the %{transform_code} property) as %{scale_numeric_value_code} where the numeric value can be specified up to two decimal places.
        header: Scale
        numeric_value: numeric value
      skin_examples:
        description_html: "%{public_skins_link} are visible and you can read their code and copy them to edit for your own use."
        header: Look at other public skins for examples
        public_skins: All approved public skins
    skins_parents:
      header: Skin Parents
      inheriting_default: By default, skins will be loaded after the Archive default style. If you don't want this, you can specify in the "What it does" menu that you want your skin to replace rather than add to the Archive default style.
      layering_html: You can combine and layer multiple site skins by making one the parent of another. Parent skins are loaded in order so that the style of all the skins can be displayed in that order. For more information on skins, please refer to %{skins_interface_faq_link}.
      load_archive_skin_components: If you create a replacement skin, you might want to load up all the skins that make up the current default Archive site as parents. This option is only available when you select "replace archive skin entirely" from the "What it does" menu. After that, you can edit your skin and delete just the ones you don't want. This will be easier if you are using nearly all of them, since there are a lot!
      load_archive_skin_components_header: Load Archive Skin Components
      skins_interface_faq: the Skins and Interface FAQ
    tags_fandoms:
      description: The name(s) of the fandom(s) to which your work belongs. Full names, rather than abbreviations, are preferred. You may list multiple fandoms, separated by commas (for example, if your work is a crossover).
      more_info_html: For more information regarding Tags, including how to add tags not currently on the Archive, please read our %{tags_faq_link}.
      page_heading: Fandom Tags
      tags_faq: Tags FAQ
    tags_ratings:
      explicit:
        description: This is for porn, graphic violence, etc.
        header: Explicit (Adult!)
      general_audiences:
        description: This content is suitable for anyone.
        header: General Audiences
      mature:
        description: This is for content with adult themes (sex, violence, etc.) that isn't as graphic as explicit-rated content.
        header: Mature (Adult!)
      more_info:
        html: "(For more information, see the %{ratings_and_warnings_tos_section_link}.)"
        ratings_and_warnings_tos_section: Ratings and Warnings section of the %{app_name} Terms of Service
      not_rated:
        description: For searching, screening, and other Archive functions, this may get treated the same way as explicit-rated content.  In reality, it could be anything from porn to completely family-friendly stuff.  Choose this rating if you prefer not to rate your content (because you don't like ratings, because you're trying to avoid spoilers, etc.).
        header: Not Rated (Adult!)
      page_heading: Rating Tags
      teen_and_up_audiences:
        description: The content may be inappropriate for audiences under 13.
        header: Teen And Up Audiences
    tags_warnings:
      choose_not_to_use:
        description: Use this if you don't want to warn for anything. You may also choose this option if you don't know what you should warn for; if you don't like warning for certain topics or warnings in general; if you want to avoid some spoilers, but not others; etc.
        header: 'Choose Not To Use Archive Warnings:'
      description: 'The %{app_name} has chosen, for legal and other reasons, to mandate that users either warn for—or explicitly choose not to warn for—a short list of common warnings: Graphic Depictions of Violence, Major Character Death, Rape/Non-Con, and Underage Sex. We understand that creators may wish to not warn for some of these things, or to warn for additional content, and have provided options for them to do so within this framework.'
      graphic_depictions_of_violence:
        description: This is for gory, graphic, explicitly described violence. Exactly where to draw the line is your call.
        header: 'Graphic Depictions Of Violence:'
      major_character_death:
        description: Please use your best judgment about who counts as a major character.
        header: 'Major Character Death:'
      no_archive_warnings_apply:
        description: Use this if the Archive warnings don't apply to your content. (In other words, if it contains no graphic depictions of violence, major character death, rape/non-con, or underage sexual activity.)
        header: 'No Archive Warnings Apply:'
      other_warnings:
        html: You can also use the "Additional Tags" field to give other or more detailed warnings. Our policies regarding warnings can be found in the %{tos_link} and %{tos_faq_link}.
        tos: Terms of Service
        tos_faq: Terms of Service FAQ
      page_heading: Warning Tags
      rape_non_con:
        description: This is your call. If you think your content may be seen as containing non-consensual sexual activity, but you don't feel like using this warning or you're not sure if you should, you always have the option of using "Choose Not to Use Archive Warnings" instead.
        header: 'Rape/Non-Con:'
      underage_sex:
        description: This is for descriptions or depictions of sexual activity involving characters under the age of eighteen. (This doesn't include dating activity like kissing or vague references with no actual description or depiction.) This warning generally applies to humans; if you are creating a pornographic work about space aliens who only live for a month or thousand-year-old vampires with twelve-year-old bodies, please just use your best judgment. You are always free to specify characters' ages or to use "Choose Not to Use Archive Warnings".
        header: 'Underage Sex:'